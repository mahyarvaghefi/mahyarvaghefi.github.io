<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter → Pixel Converter</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0e17;
    color: #e0e6f0;
    font-family: 'IBM Plex Mono', 'Fira Code', monospace;
    padding: 20px;
  }
  .wrap { max-width: 820px; margin: 0 auto; }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px; font-weight: 700; color: #38bdf8;
    text-align: center; letter-spacing: -0.5px;
  }
  .subtitle { font-size: 12px; color: #64748b; text-align: center; margin: 4px 0 20px; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 2px solid #1e293b; margin-bottom: 16px; }
  .tabs button {
    flex: 1; padding: 10px; background: transparent; color: #64748b;
    border: none; border-bottom: 2px solid transparent; cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 600; margin-bottom: -2px;
  }
  .tabs button.active { background: #1e293b; color: #38bdf8; border-bottom-color: #38bdf8; }

  /* Controls row */
  .controls { margin-bottom: 12px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
  .lbl-text { font-size: 11px; color: #94a3b8; margin-right: 4px; }
  .lbl-btn {
    width: 40px; height: 36px; margin: 0 3px; border-radius: 6px; cursor: pointer;
    font-family: inherit; font-size: 16px; font-weight: 700;
    background: #1e293b; color: #94a3b8; border: 2px solid #2d3a4f;
  }
  .lbl-btn.active { background: #38bdf8; color: #0a0e17; border-color: #38bdf8; }
  .brush-lbl { font-size: 11px; color: #475569; margin-left: 10px; }
  .brush-lbl input { width: 70px; vertical-align: middle; margin-left: 4px; }

  /* Canvas area */
  .canvas-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px; }
  .canvas-col label {
    display: block; font-size: 10px; color: #475569; margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  canvas.draw {
    border: 2px solid #2d3a4f; border-radius: 8px; cursor: crosshair;
    touch-action: none; display: block; width: 100%; max-width: 300px;
  }
  canvas.grid-view {
    border: 2px solid #2d3a4f; border-radius: 8px; display: block;
    width: 100%; max-width: 300px; image-rendering: pixelated;
  }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .btn {
    padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600;
  }
  .btn-blue { background: #0ea5e9; color: #fff; }
  .btn-green { background: #10b981; color: #fff; }
  .btn-green:disabled { background: #1e293b; color: #475569; cursor: default; }
  .btn-gray { background: #1e293b; color: #94a3b8; }

  /* Pixel preview */
  .preview-box {
    background: #111827; border: 1px solid #1e293b; border-radius: 8px;
    padding: 12px; margin-bottom: 16px;
  }
  .preview-box h3 { font-size: 11px; color: #38bdf8; font-weight: 600; margin-bottom: 6px; }
  .pix-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(72px,1fr));
    gap: 4px; font-size: 10px; max-height: 100px; overflow: auto;
  }
  .pix-cell {
    background: #0a0e17; padding: 3px 6px; border-radius: 4px;
    display: flex; justify-content: space-between;
  }
  .pix-cell .k { color: #64748b; }
  .pix-cell .v-on { color: #fbbf24; }
  .pix-cell .v-off { color: #475569; }
  .preview-note { font-size: 10px; color: #475569; margin-top: 4px; }

  /* Dataset tab */
  .stat-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card {
    flex: 1; min-width: 70px; background: #111827; border: 1px solid #1e293b;
    border-radius: 8px; padding: 10px 12px; text-align: center;
  }
  .stat-card .num { font-size: 22px; font-weight: 700; color: #38bdf8; }
  .stat-card .lbl { font-size: 11px; color: #64748b; }

  .dl-btn { width: 100%; margin-bottom: 12px; }

  .table-wrap {
    background: #111827; border: 1px solid #1e293b; border-radius: 8px; overflow: hidden;
  }
  .table-hdr, .table-row {
    display: grid; grid-template-columns: 36px 44px 1fr 36px;
    gap: 8px; padding: 6px 12px; align-items: center;
  }
  .table-hdr {
    font-size: 10px; color: #475569; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; border-bottom: 1px solid #1e293b; padding: 8px 12px;
  }
  .table-body { max-height: 340px; overflow: auto; }
  .table-row { border-bottom: 1px solid #1e293b; font-size: 12px; }
  .table-row .idx { color: #475569; }
  .table-row .letter { color: #38bdf8; font-weight: 700; font-size: 16px; }
  .table-row .del-btn {
    background: none; border: none; color: #ef4444; cursor: pointer;
    font-size: 14px; padding: 0;
  }
  canvas.mini {
    width: 40px; height: 40px; border-radius: 4px;
    border: 1px solid #2d3a4f; image-rendering: pixelated;
  }

  .empty-msg { text-align: center; padding: 40px; color: #475569; font-size: 13px; }

  .format-box {
    margin-top: 16px; background: #111827; border: 1px solid #1e293b;
    border-radius: 8px; padding: 12px; font-size: 11px; color: #64748b; line-height: 1.6;
  }
  .format-box h4 { color: #38bdf8; font-weight: 600; margin-bottom: 4px; font-size: 11px; }
  .format-box code { color: #94a3b8; }

  .hidden { display: none; }
  .group-row { margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .group-warn { font-size: 11px; color: #f59e0b; font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Letter → Pixel Converter</h1>
  <p class="subtitle">Draw letters (A–E), convert to 28×28 = 784 pixel features (p0–p783) for classification</p>

  <div class="tabs">
    <button id="tab-draw" class="active" onclick="switchTab('draw')">✏️ Draw &amp; Convert</button>
    <button id="tab-data" onclick="switchTab('data')">📊 Dataset (<span id="tab-count">0</span>)</button>
  </div>

  <!-- DRAW TAB -->
  <div id="panel-draw">
    <div class="group-row">
      <span class="lbl-text">GROUP:</span>
      <input type="text" id="groupId" placeholder="e.g. Group 1" maxlength="30"
        style="background:#111827;border:2px solid #2d3a4f;border-radius:6px;color:#e0e6f0;
        font-family:inherit;font-size:13px;padding:6px 10px;width:160px;" />
      <span class="group-warn hidden" id="group-warn">⚠ Set group before adding</span>
    </div>

    <div class="controls">
      <span class="lbl-text">LABEL:</span>
      <button class="lbl-btn active" onclick="pickLabel(this,'A')">A</button>
      <button class="lbl-btn" onclick="pickLabel(this,'B')">B</button>
      <button class="lbl-btn" onclick="pickLabel(this,'C')">C</button>
      <button class="lbl-btn" onclick="pickLabel(this,'D')">D</button>
      <button class="lbl-btn" onclick="pickLabel(this,'E')">E</button>
      <span class="brush-lbl">Brush:<input type="range" min="4" max="24" value="12" id="brush"></span>
    </div>

    <div class="canvas-row">
      <div class="canvas-col">
        <label>Draw "<span id="draw-label">A</span>" here</label>
        <canvas id="drawCanvas" class="draw" width="300" height="300"></canvas>
      </div>
      <div class="canvas-col" id="grid-col" style="display:none">
        <label>28×28 pixel grid</label>
        <canvas id="gridCanvas" class="grid-view" width="300" height="300"></canvas>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-blue" onclick="convertToPixels()">Convert to Pixels</button>
      <button class="btn btn-green" id="addBtn" disabled onclick="addToDataset()">+ Add to Dataset</button>
      <button class="btn btn-gray" onclick="clearCanvas()">Clear</button>
    </div>

    <div id="preview" class="preview-box hidden">
      <h3>PIXEL VALUES PREVIEW (first 20 of 784)</h3>
      <div class="pix-grid" id="pix-grid"></div>
      <div class="preview-note">… p20 through p783 (download CSV to see all)</div>
    </div>
  </div>

  <!-- DATA TAB -->
  <div id="panel-data" class="hidden">
    <div class="stat-row" id="stat-row"></div>
    <div id="data-content"></div>
  </div>
</div>

<script>
const GRID = 28, TOTAL = GRID * GRID, LABELS = ["A","B","C","D","E"];
let currentLabel = "A", pixels = null, dataset = [], drawing = false;

const dc = document.getElementById("drawCanvas");
const dctx = dc.getContext("2d");
const gc = document.getElementById("gridCanvas");
const gctx = gc.getContext("2d");
const brush = document.getElementById("brush");

// Init canvas black
dctx.fillStyle = "#000";
dctx.fillRect(0,0,300,300);

function pos(e) {
  const r = dc.getBoundingClientRect();
  const sx = dc.width / r.width, sy = dc.height / r.height;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (cx - r.left)*sx, y: (cy - r.top)*sy };
}
function dot(e) {
  const p = pos(e);
  dctx.fillStyle = "#fff";
  dctx.beginPath();
  dctx.arc(p.x, p.y, +brush.value, 0, Math.PI*2);
  dctx.fill();
}
function startD(e){ e.preventDefault(); drawing=true; dot(e); }
function moveD(e){ if(drawing) dot(e); }
function stopD(){ drawing=false; }
dc.addEventListener("mousedown",startD);
dc.addEventListener("mousemove",moveD);
dc.addEventListener("mouseup",stopD);
dc.addEventListener("mouseleave",stopD);
dc.addEventListener("touchstart",startD,{passive:false});
dc.addEventListener("touchmove",moveD,{passive:false});
dc.addEventListener("touchend",stopD);

function switchTab(t) {
  document.getElementById("panel-draw").classList.toggle("hidden", t!=="draw");
  document.getElementById("panel-data").classList.toggle("hidden", t!=="data");
  document.getElementById("tab-draw").classList.toggle("active", t==="draw");
  document.getElementById("tab-data").classList.toggle("active", t==="data");
  if (t==="data") renderDataTab();
}

function pickLabel(btn, l) {
  currentLabel = l;
  document.querySelectorAll(".lbl-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("draw-label").textContent = l;
}

function clearCanvas() {
  dctx.fillStyle = "#000";
  dctx.fillRect(0,0,300,300);
  pixels = null;
  document.getElementById("addBtn").disabled = true;
  document.getElementById("preview").classList.add("hidden");
  document.getElementById("grid-col").style.display = "none";
}

function convertToPixels() {
  const img = dctx.getImageData(0,0,300,300).data;
  const cw = 300/GRID, ch = 300/GRID;
  pixels = new Array(TOTAL);
  for (let r=0; r<GRID; r++) {
    for (let c=0; c<GRID; c++) {
      let sum=0, cnt=0;
      const sx=Math.floor(c*cw), ex=Math.floor((c+1)*cw);
      const sy=Math.floor(r*ch), ey=Math.floor((r+1)*ch);
      for (let y=sy; y<ey; y++) for (let x=sx; x<ex; x++) { sum+=img[(y*300+x)*4]; cnt++; }
      pixels[r*GRID+c] = Math.round(sum/cnt);
    }
  }
  // draw grid
  gctx.fillStyle = "#000";
  gctx.fillRect(0,0,300,300);
  const s = 300/GRID;
  for (let r=0; r<GRID; r++) for (let c=0; c<GRID; c++) {
    const v = pixels[r*GRID+c];
    gctx.fillStyle = `rgb(${v},${v},${v})`;
    gctx.fillRect(c*s, r*s, s, s);
  }
  gctx.strokeStyle = "rgba(80,200,255,0.15)";
  gctx.lineWidth = 0.5;
  for (let i=0; i<=GRID; i++) {
    gctx.beginPath(); gctx.moveTo(i*s,0); gctx.lineTo(i*s,300); gctx.stroke();
    gctx.beginPath(); gctx.moveTo(0,i*s); gctx.lineTo(300,i*s); gctx.stroke();
  }
  document.getElementById("grid-col").style.display = "";
  document.getElementById("addBtn").disabled = false;

  // preview
  const pg = document.getElementById("pix-grid");
  pg.innerHTML = "";
  for (let i=0; i<20; i++) {
    const v = pixels[i];
    pg.innerHTML += `<div class="pix-cell"><span class="k">p${i}</span><span class="${v>128?'v-on':'v-off'}">${v}</span></div>`;
  }
  document.getElementById("preview").classList.remove("hidden");
}

function addToDataset() {
  if (!pixels) return;
  const gid = document.getElementById("groupId").value.trim();
  if (!gid) {
    document.getElementById("group-warn").classList.remove("hidden");
    document.getElementById("groupId").focus();
    return;
  }
  document.getElementById("group-warn").classList.add("hidden");
  dataset.push({ group: gid, label: currentLabel, pixels: [...pixels] });
  document.getElementById("tab-count").textContent = dataset.length;
  clearCanvas();
}

function renderDataTab() {
  // stats
  const sr = document.getElementById("stat-row");
  sr.innerHTML = LABELS.map(l => {
    const n = dataset.filter(d=>d.label===l).length;
    return `<div class="stat-card"><div class="num">${n}</div><div class="lbl">Label ${l}</div></div>`;
  }).join("");

  const dc2 = document.getElementById("data-content");
  if (dataset.length === 0) {
    dc2.innerHTML = `<div class="empty-msg">No samples yet. Go to Draw tab, write a letter, convert, and add it.</div>`;
    return;
  }

  let html = `<button class="btn btn-blue dl-btn" onclick="downloadCSV()">⬇ Download CSV (${dataset.length} rows × ${TOTAL+2} cols)</button>`;
  html += `<div class="table-wrap"><div class="table-hdr" style="grid-template-columns:36px 70px 44px 1fr 36px"><span>#</span><span>Group</span><span>Label</span><span>Preview</span><span></span></div><div class="table-body">`;
  dataset.forEach((d,i) => {
    html += `<div class="table-row" style="grid-template-columns:36px 70px 44px 1fr 36px"><span class="idx">${i+1}</span><span style="color:#94a3b8;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.group}</span><span class="letter">${d.label}</span><span><canvas class="mini" id="mini-${i}" width="100" height="100"></canvas></span><span><button class="del-btn" onclick="removeRow(${i})">✕</button></span></div>`;
  });
  html += `</div></div>`;
  html += `<div class="format-box"><h4>CSV FORMAT</h4><code>group, label, p0, p1, p2, … p${TOTAL-1}</code><br>Each p<i>i</i> is 0–255 (0 = black, 255 = white).<br>Rows = samples, Columns = 1 group + 1 label + ${TOTAL} features.</div>`;
  dc2.innerHTML = html;

  // draw mini previews
  dataset.forEach((d,i) => {
    const mc = document.getElementById("mini-"+i);
    if (!mc) return;
    const mx = mc.getContext("2d");
    const ms = mc.width / GRID;
    for (let r=0; r<GRID; r++) for (let c=0; c<GRID; c++) {
      const v = d.pixels[r*GRID+c];
      mx.fillStyle = `rgb(${v},${v},${v})`;
      mx.fillRect(c*ms, r*ms, ms, ms);
    }
  });
}

function removeRow(i) {
  dataset.splice(i,1);
  document.getElementById("tab-count").textContent = dataset.length;
  renderDataTab();
}

function downloadCSV() {
  if (!dataset.length) return;
  const gid = dataset[0].group.replace(/\s+/g,'_');
  const hdr = ["group","label",...Array.from({length:TOTAL},(_,i)=>"p"+i)].join(",");
  const rows = dataset.map(d => [d.group,...[d.label],...d.pixels].join(","));
  const csv = [hdr,...rows].join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download = "letter_pixels_"+gid+".csv";
  a.click();
}
</script>
</body>
</html>
